<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker - Dashboard</title>

    <!-- ✅ Tailwind CSS (REQUIRED) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ✅ Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-blue-100 font-sans">


<!-- Top Navbar -->
<nav class="bg-blue-700 text-white px-8 py-4 flex justify-between items-center shadow-md">
    <h2 class="text-xl font-bold">Smart Spend</h2>

    <div class="flex items-center gap-6">

        <button onclick="logout()"
                class="bg-red-500 hover:bg-red-600 px-4 py-1 rounded transition">
            Logout
        </button>
    </div>
</nav>

<div class="max-w-7xl mx-auto p-10">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">Dashboard</h1>
        <p id="welcomeText" class="text-gray-500">Welcome back 👋</p>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-4 gap-6 mb-10">

        <div class="bg-white p-6 rounded-xl shadow">
            <p class="text-gray-500">Total Expenses</p>
            <h2 id="totalAmount" class="text-2xl font-bold text-blue-600">₹0</h2>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <p class="text-gray-500">This Month</p>
            <h2 id="monthlyTotal" class="text-2xl font-bold text-green-600">₹0</h2>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <p class="text-gray-500">Transactions</p>
            <h2 id="transactionCount" class="text-2xl font-bold text-purple-600">0</h2>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <p class="text-gray-500">Monthly Budget</p>
            <h2 id="budgetAmount" class="text-2xl font-bold text-red-600">₹0</h2>

            <div class="w-full bg-gray-200 rounded-full h-3 mt-4">
                <div id="budgetProgress"
                     class="bg-red-500 h-3 rounded-full transition-all duration-500"
                     style="width: 0%">
                </div>
            </div>
        </div>

    </div>

    <!-- Charts -->
    <div class="grid grid-cols-2 gap-6 mb-10">

        <div class="bg-white p-6 rounded-xl shadow h-80">
            <h3 class="font-semibold mb-4">Category Distribution</h3>
            <canvas id="expenseChart"></canvas>
        </div>

        <div class="bg-white p-6 rounded-xl shadow h-80">
            <h3 class="font-semibold mb-4">Monthly Trend</h3>
            <canvas id="monthlyChart"></canvas>
        </div>

    </div>

    <!-- Set Monthly Budget -->
<div class="bg-white p-6 rounded-xl shadow mb-10">
    <h3 class="font-semibold mb-4">Set Monthly Budget</h3>

    <div class="flex gap-4">
        <input id="budgetInput"
               type="number"
               min="0"
               step="0.01"
               class="border p-2 rounded w-1/3"
               placeholder="Enter budget amount">

        <button onclick="setBudget()"
                class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 transition">
            Save Budget
        </button>
    </div>
</div>


    <!-- Add Expense -->
    <div class="bg-white p-6 rounded-xl shadow mb-10">
        <h3 class="font-semibold mb-4">Add Expense</h3>

        <div class="grid grid-cols-4 gap-4">
          <input id="amount"
       type="number"
       min="0"
       step="0.01"
       class="border p-2 rounded"
       placeholder="Amount">


            <input id="category"
                   class="border p-2 rounded"
                   placeholder="Category">

            <input id="description"
                   class="border p-2 rounded"
                   placeholder="Description (optional)">

            <input type="date" id="date"
                   class="border p-2 rounded">
        </div>

        <button onclick="addExpense()"
                class="mt-4 bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
            Add Expense
        </button>
    </div>

    <!-- Expense List -->
    <div class="bg-white p-6 rounded-xl shadow">
        <h3 class="font-semibold mb-4">Recent Transactions</h3>
        <div id="expenseList"></div>
    </div>

</div>

<script src="js/dashboard.js"></script>

</body>
