<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker - Login</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-50 to-blue-100 flex items-center justify-center">



    <div class="w-full max-w-md bg-white p-10 rounded-2xl shadow-lg">

        <!-- Brand -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Smart Spend</h1>
            <p class="text-gray-500 text-sm mt-2">
                Manage your expenses with clarity and control
            </p>
        </div>

        <input type="email"
               id="email"
               placeholder="Email"
               class="w-full border border-gray-300 p-3 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

        <input type="password"
               id="password"
               placeholder="Password"
               class="w-full border border-gray-300 p-3 rounded-lg mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500">

        <button onclick="login()"
                class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition mb-3">
            Login
        </button>

        <button onclick="register()"
                class="w-full bg-gray-200 py-3 rounded-lg hover:bg-gray-300 transition">
            Register
        </button>

        <p id="message" class="text-center text-sm mt-4 text-red-500"></p>

    </div>
<script src="js/auth.js"></script>

</body>
